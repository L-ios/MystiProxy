# MystiProxy Frontend Proxy
# 使用 MystiProxy 自身的静态文件服务能力代理前端
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: mock-management
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: static-server
data:
  # MystiProxy 配置 - 使用静态文件服务
  config.yaml: |
    server:
      listen: tcp://0.0.0.0:80
    static:
      enabled: true
      root: /app/frontend
      index_files:
        - index.html
      enable_directory_listing: false
    proxy:
      # API 代理到 mysticentral
      rules:
        - path: /api
          target: tcp://mysticentral-service:8080
        - path: /health
          target: tcp://mysticentral-service:8080
---
# Frontend Deployment (使用 MystiProxy 作为静态服务器)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mock-management
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: static-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: static-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: static-server
    spec:
      containers:
        - name: mystiproxy
          image: mystiproxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: frontend-files
              mountPath: /app/frontend
              readOnly: true
            - name: config
              mountPath: /app/config
              readOnly: true
          command:
            - /mystiproxy
            - --config
            - /app/config/config.yaml
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: frontend-files
          configMap:
            name: frontend-static-files
        - name: config
          configMap:
            name: frontend-config
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mock-management
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: static-server
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: static-server
---
# Frontend Ingress (不使用 nginx，直接暴露服务)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: mock-management
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: static-server
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: mystiproxy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
