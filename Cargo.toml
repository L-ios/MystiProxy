[package]
name = "mystiproxy"
version = "0.1.0"
edition = "2021"
description = "A flexible HTTP proxy with mock support"
license = "MIT"

[dependencies]
# 异步运行时
tokio = { version = "1", features = ["full"] }

# HTTP 库
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1"
http = "1"
bytes = "1"

# 配置解析
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# 错误处理
thiserror = "1"
anyhow = "1"

# 正则匹配
regex = "1"

# JSONPath 支持
jsonpath-rust = "0.5"

# TLS 支持
tokio-rustls = "0.26"
rustls = "0.23"
rustls-pemfile = "2"
webpki-roots = "0.26"

# URL 解析
url = "2"

# JWT 认证
jsonwebtoken = "9"

# 命令行参数解析
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
